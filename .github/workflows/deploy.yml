name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Get the latest code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js so we can build the React app
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install npm dependencies (uses package-lock.json for repeatable builds)
      - name: Install dependencies
        run: npm ci

      # 4. Build the React app. This produces the dist/ folder with the build timestamp baked in.
      - name: Build
        run: npm run build

      # 5. Configure AWS credentials using GitHub Secrets.
      #    These are encrypted and only available to this workflow run.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 6. Sync dist/ to S3.
      #    --delete removes files in the bucket that are no longer in dist/
      #    This keeps the bucket clean as we update versions.
      - name: Sync dist to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

      # 7. Upload index.html separately with a short cache.
      #    Why: assets like JS/CSS have hashed filenames (cache forever is safe).
      #    But index.html itself is the "entry point" -- if we cached it for a year,
      #    users would keep seeing the old version even after a deploy.
      - name: Upload index.html with no-cache
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # 8. Invalidate the CloudFront cache.
      #    Without this, CloudFront would keep serving the OLD version from its edge
      #    locations for up to 24 hours. Invalidation forces it to fetch the new files
      #    from S3 the next time someone requests them.
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # 9. Print a success message with the live URL
      - name: Deployment summary
        run: |
          echo "::notice::Deployment complete! Live at https://d3e4ns0lp7i9a5.cloudfront.net"
